<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Planner</title>
<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#fff7f8;
color:#6d5555;
}
.tabs{
display:flex;
overflow:auto;
gap:10px;
padding:14px;
background:white;
position:sticky;
top:0;
z-index:999;
border-bottom:1px solid #f1d9df;
}
.tab{
white-space:nowrap;
border:1px solid #f1d9df;
padding:12px 18px;
border-radius:999px;
background:white;
font-weight:700;
cursor:pointer;
}
.tab.active{
background:#ef7298;
color:white;
}
.section{
display:none;
padding:14px;
}
.section.active{
display:block;
}
.card{
background:white;
border:1px solid #f1d9df;
border-radius:28px;
padding:20px;
margin-bottom:20px;
}
h1{
text-align:center;
font-size:42px;
margin-top:40px;
margin-bottom:10px;
}
.subtitle{
text-align:center;
font-size:20px;
margin-bottom:30px;
}
.countdown{
display:flex;
justify-content:center;
gap:18px;
margin-bottom:20px;
}
.count-box{
background:white;
border:1px solid #f1d9df;
border-radius:24px;
width:90px;
height:90px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}
.count-num{
font-size:34px;
font-weight:800;
color:#ef7298;
}
input,textarea{
width:100%;
padding:14px;
border-radius:18px;
border:1px solid #f1d9df;
margin-top:10px;
margin-bottom:14px;
font-size:18px;
box-sizing:border-box;
}
button{
border:none;
background:#ef7298;
color:white;
padding:14px 22px;
border-radius:18px;
font-size:18px;
font-weight:700;
cursor:pointer;
}
.group-card{
border:1px solid #f1d9df;
border-radius:20px;
padding:18px;
margin-top:16px;
background:#fff;
}
.export-btn{
position:fixed;
right:20px;
bottom:20px;
z-index:999;
}
</style>
</head>
<body>
<div class="tabs">
<div class="tab active" onclick="showTab('home',this)">首頁</div>
<div class="tab" onclick="showTab('menu',this)">試菜</div>
<div class="tab" onclick="showTab('host',this)">主持人討論</div>
<div class="tab" onclick="showTab('engage',this)">文定迎娶</div>
<div class="tab" onclick="showTab('flow',this)">婚宴流程</div>
</div>
<div id="home" class="section active">
<div class="card">
<h1>張駿瑋 & 吳芯靜</h1>
<div class="subtitle">
文定・迎娶・婚宴
</div>
<div class="countdown">
<div class="count-box">
<div class="count-num" id="days">--</div>
<div>天</div>
</div>
<div class="count-box">
<div class="count-num" id="hours">--</div>
<div>時</div>
</div>
<div class="count-box">
<div class="count-num" id="mins">--</div>
<div>分</div>
</div>
</div>
</div>
<div class="card">
<h2>婚禮資訊總覽</h2>
<label>婚宴日期</label>
<input id="dateInput" value="2026-07-18">
<label>宴客地點</label>
<input id="placeInput" value="海豐餐廳">
<button onclick="saveInfo()">儲存資訊</button>
</div>
<div class="card">
<h2>工作人員</h2>
<input id="groupName" placeholder="群組名稱">
<textarea id="groupPeople"
rows="5"
placeholder="多人可一起輸入"></textarea>
<button onclick="addGroup()">新增群組</button>
<div id="groupList"></div>
</div>
</div>
<div id="menu" class="section">
<div class="card">
<h2>試菜</h2>
<textarea rows="8"></textarea>
</div>
</div>
<div id="host" class="section">
<div class="card">
<h2>主持人討論</h2>
<textarea rows="8"></textarea>
</div>
</div>
<div id="engage" class="section">
<div class="card">
<h2>文定迎娶</h2>
<textarea rows="8"></textarea>
</div>
</div>
<div id="flow" class="section">
<div class="card">
<h2>婚宴流程</h2>
<textarea rows="8"></textarea>
</div>
</div>
<button class="export-btn" onclick="exportHTML()">
匯出目前 HTML
</button>
<script>
function showTab(id,el){
document.querySelectorAll('.section').forEach(s=>{
s.classList.remove('active');
});
document.getElementById(id).classList.add('active');
document.querySelectorAll('.tab').forEach(t=>{
t.classList.remove('active');
});
el.classList.add('active');
}
function updateCountdown(){
const target=new Date('2026-07-18 11:00:00');
const now=new Date();
const diff=target-now;
const days=Math.floor(diff/1000/60/60/24);
const hours=Math.floor(diff/1000/60/60)%24;
const mins=Math.floor(diff/1000/60)%60;
document.getElementById('days').innerText=days;
document.getElementById('hours').innerText=hours;
document.getElementById('mins').innerText=mins;
}
setInterval(updateCountdown,1000);
updateCountdown();
function saveInfo(){
localStorage.setItem(
'weddingDate',
document.getElementById('dateInput').value
);
localStorage.setItem(
'weddingPlace',
document.getElementById('placeInput').value
);
alert('已儲存');
}
function addGroup(){
const name=document.getElementById('groupName').value;
const people=document.getElementById('groupPeople').value;
if(!name || !people){
alert('請輸入群組名稱與內容');
return;
}
const html=`
<div class="group-card">
<h3>${name}</h3>
<div>${people.replace(/\n/g,'<br>')}</div>
</div>
`;
document.getElementById('groupList').innerHTML += html;
localStorage.setItem(
'groupHTML',
document.getElementById('groupList').innerHTML
);
document.getElementById('groupName').value='';
document.getElementById('groupPeople').value='';
}
window.onload=function(){
const groupHTML=localStorage.getItem('groupHTML');
if(groupHTML){
document.getElementById('groupList').innerHTML=groupHTML;
}
const savedDate=localStorage.getItem('weddingDate');
const savedPlace=localStorage.getItem('weddingPlace');
if(savedDate){
document.getElementById('dateInput').value=savedDate;
}
if(savedPlace){
document.getElementById('placeInput').value=savedPlace;
}
}
function exportHTML(){
const html=document.documentElement.outerHTML;
const blob=new Blob([html],{
type:'text/html'
});
const a=document.createElement('a');
a.href=URL.createObjectURL(blob);
a.download='index.html';
a.click();
}
</script>
</body>
</html>
